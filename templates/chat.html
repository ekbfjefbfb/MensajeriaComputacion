<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Computación 1</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Estilos externos -->
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>
    <!-- ==========================================
         LOGIN SCREEN - Minimalista & Glassmorphism
         ========================================== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box glass-panel">
            <h1 class="brand-title">Computación 1</h1>
            <p class="brand-subtitle">Bienvenido al espacio interactivo</p>
            
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-upload" id="avatarUpload">
                    <span class="avatar-icon" id="avatarPlaceholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </span>
                    <img id="avatarPreview" style="display: none;">
                </div>
                <input type="file" class="avatar-input" id="avatarInput" accept="image/*">
            </div>
            
            <!-- Name Section -->
            <div class="name-section">
                <input type="text" class="minimal-input" id="nameInput" 
                       placeholder="Tu alias o nombre" maxlength="20" autocomplete="off" spellcheck="false">
            </div>
            
            <button class="primary-btn fluid-btn" id="joinBtn">
                <span>Ingresar</span>
                <svg viewBox="0 0 24 24" class="btn-icon"><path fill="currentColor" d="m12 4-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
            </button>
            <div class="error-text" id="errorMessage"></div>
        </div>
    </div>
    
    <!-- ==========================================
         CHAT APPLICATION
         ========================================== -->
    <div class="app-container hidden" id="chatApp">
        <!-- Sidebar: User List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Salas Reales</h2>
            </div>
            <ul class="user-list" style="padding: 0 12px; margin-bottom: 5px; flex: none;">
                <li class="user-item active-chat" id="btnGlobalChat" onclick="PrivateChatModule.cerrar()" style="background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3);">
                    <div class="avatar-placeholder" style="background: var(--accent); color: white;">#</div>
                    <div style="display: flex; flex-direction: column;">
                        <span class="nombre" style="font-weight: 700; color: white; font-size: 0.95rem;">Computación 1</span>
                        <span style="font-size: 0.7rem; color: var(--online);">Sala General</span>
                    </div>
                </li>
            </ul>
            
            <div class="sidebar-header" style="padding-top: 10px; border-top: 1px solid var(--border-color);">
                <h2>Directorio</h2>
                <span class="online-badge" id="onlineBadge">
                    <span class="pulse-dot"></span> <span id="onlineCount">1</span>
                </span>
            </div>
            <ul class="user-list" id="userList"></ul>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="chat-header glass-header">
                <div class="header-info">
                    <div class="header-titles">
                        <h2 class="room-title" id="chatTitle">Computación 1</h2>
                        <span class="room-subtitle" id="chatSubtitle">Sala principal global</span>
                    </div>
                    <div class="typing-indicator" id="typingIndicator"></div>
                </div>
                <button id="closePrivateBtn" class="icon-btn hidden" onclick="PrivateChatModule.cerrar()" aria-label="Volver">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
            </header>
            
            <!-- Messages -->
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="scroll-to-bottom hidden" id="scrollToBottomBtn">
               <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </div>
            
            <!-- Input Area -->
            <div class="input-container glass-footer">
                <div class="input-wrapper">
                    <!-- Sticker Button -->
                    <button class="icon-btn-input" id="stickerBtn" aria-label="Stickers">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5s.67 1.5 1.5 1.5zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                    </button>
                    
                    <!-- File Attach Button -->
                    <button class="icon-btn-input" id="attachBtn" aria-label="Adjuntar">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
                    </button>
                    <input type="file" id="mediaInput" accept="image/*,video/*,audio/*,application/pdf" style="display: none;">

                    <input type="text" class="chat-input" id="messageInput" 
                           placeholder="Escribe un mensaje..." autocomplete="off">
                    
                    <!-- Mic Button -->
                    <button class="icon-btn-input" id="micBtn" aria-label="Grabar Audio">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </button>

                    <button class="send-action-btn hidden" id="sendBtn" aria-label="Enviar">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                
                <!-- Sticker Panel -->
                <div class="sticker-panel hidden" id="stickerPanel">
                    <div class="sticker-item" data-sticker="🔥">🔥</div>
                    <div class="sticker-item" data-sticker="❤️">❤️</div>
                    <div class="sticker-item" data-sticker="😂">😂</div>
                    <div class="sticker-item" data-sticker="👍">👍</div>
                    <div class="sticker-item" data-sticker="🚀">🚀</div>
                    <div class="sticker-item" data-sticker="😮">😮</div>
                    <div class="sticker-item" data-sticker="👏">👏</div>
                    <div class="sticker-item" data-sticker="💡">💡</div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- JavaScript Module -->
    <script src="/static/js/chat.js"></script>
</body>
</html>
